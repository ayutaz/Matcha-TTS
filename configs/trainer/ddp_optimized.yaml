defaults:
  - default

strategy:
  _target_: lightning.pytorch.strategies.DDPStrategy
  find_unused_parameters: false
  gradient_as_bucket_view: true
  static_graph: true

accelerator: gpu
devices: [0,1,2,3]
num_nodes: 1
sync_batchnorm: true

# reduce validation frequency to cut overhead on multi-GPU runs
check_val_every_n_epoch: 10
