# @package _global_

# Fast Japanese multi-speaker TTS training with JVS corpus (100 speakers)
# Uses pre-computed features and DDP-optimized trainer for maximum throughput
# To execute: python matcha/train.py experiment=jvs_fast

defaults:
  - override /data: jvs_precomputed.yaml
  - override /trainer: ddp_optimized.yaml
  - override /callbacks: default.yaml

tags: ["jvs", "japanese", "multispeaker", "fast"]

run_name: jvs_fast

model:
  n_vocab: 55
  optimizer:
    lr: 5e-4
    weight_decay: 0.01
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    _partial_: true
    T_max: 100
    eta_min: 1e-5

compile_model: true
compile_mode: "default"
gradient_checkpointing: true

callbacks:
  early_stopping:
    _target_: lightning.pytorch.callbacks.EarlyStopping
    monitor: "loss/val"
    patience: 5
    min_delta: 0.001
    mode: "min"
    check_finite: true
    verbose: true
  ema:
    _target_: lightning.pytorch.callbacks.EMAWeightAveraging
    decay: 0.9995
    update_every_n_steps: 1
    update_starting_at_epoch: 5

trainer:
  max_epochs: 100
